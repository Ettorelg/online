<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Chiamato</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* --- STILI --- */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #000;
    color: white;
    display: flex;
    height: 100vh;
}

/* Colonna sinistra QR + carousel */
.left-section {
    display: flex;
    flex-direction: column;
    width: 30%;
    background-color: #222;
    border-right: 2px solid #ffcc00;
    overflow: hidden;
}

.qrcode-wrapper {
    flex: 0 0 30%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.qrcode-container { width: 80%; height: auto; }

.carousel-container {
    flex: 1;
    overflow: hidden;
    position: relative;
}

.carousel-images {
    display: flex;
    transition: transform 1s ease-in-out;
    height: 100%;
}

.carousel-images img {
    width: 100%;
    flex-shrink: 0;
}

/* Cronologia */
.history-wrapper {
    flex: 0 0 40%;
    overflow-y: auto;
    padding: 10px;
}

.history-title { font-size: 22px; text-align: center; color: #ffcc00; margin-bottom: 6px; }

.history-list { list-style: none; padding: 0; margin: 0; }

.history-item {
    background: rgba(255,255,255,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    font-weight: bold;
    margin-bottom: 3px;
    transition: transform 0.3s ease-in-out, background 0.2s ease-in-out;
}

.history-number { font-size: 24px; background: #ffcc00; color: black; padding: 4px 10px; border-radius: 6px; min-width: 42px; text-align: center; }
.history-text { flex:1; font-size: 20px; color: #ffcc00; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-time { font-size: 14px; opacity: 0.7; min-width: 50px; text-align: right; }

.history-item:hover { transform: scale(1.02); background: rgba(255,255,255,0.16); }

.fade-in { animation: fadeInUp 350ms ease-out; }
@keyframes fadeInUp { from {opacity:0; transform:translateY(12px);} to {opacity:1; transform:translateY(0);} }

/* Colonna destra ticket */
.right-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 70%;
    padding: 20px;
    background-color: #000;
}

.reparti-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    width: 100%;
    max-width: 900px;
}

.reparto-container {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.reparto-nome {
    font-size: clamp(18px, 3vw, 30px);
    font-weight: bold;
    color: #ffcc00;
    text-transform: uppercase;
}

.ticket-number {
    font-size: clamp(50px, 8vw, 120px);
    font-weight: bold;
    padding: 20px;
    background-color: #ffcc00;
    color: black;
    border-radius: 10px;
    display: inline-block;
    min-width: 150px;
    text-align: center;
    transition: transform 0.3s ease-in-out, background-color 0.3s ease-in-out;
}

.highlight { animation: pulse 1s infinite alternate; }
@keyframes pulse { from {transform:scale(1); background-color:#ffcc00;} to {transform:scale(1.2); background-color:#ff3300;} }
</style>
</head>
<body>
<div class="left-section">
    <div class="qrcode-wrapper">
        <div id="qrcode" class="qrcode-container"></div>
    </div>
    <div class="carousel-container">
        <div class="carousel-images">
            {% for immagine in immagini %}
            <img src="{{ immagine }}" alt="Immagine" />
            {% endfor %}
        </div>
    </div>
    <div class="history-wrapper">
        <h2 class="history-title">🕘 Cronologia Ticket</h2>
        <ul class="history-list" id="historyList"></ul>
    </div>
</div>

<div class="right-section">
    <div class="reparti-container">
        {% for reparto in reparti %}
        <div class="reparto-container">
            <div class="reparto-nome">{{ reparto[1] }}</div>
            <div class="ticket-number" id="ticket-{{ reparto[0] }}" data-reparto="{{ reparto[1] }}">
                {{ numeri_chiamati[reparto[0]] if reparto[0] in numeri_chiamati else 0 }}
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
// --- SOCKET.IO + QR ---
const socket = io("wss://software.alphasystemsrl.it", {transports:["websocket"],secure:true,reconnection:true});
let selectedVoice = null;
const audio = new Audio("https://software.alphasystemsrl.it/static/ding.mp3");

function loadVoices() {
    const voices = window.speechSynthesis.getVoices();
    selectedVoice = voices.find(v => v.name.includes("Microsoft Elsa")) ||
                    voices.find(v => v.name.includes("Google italiano femminile")) ||
                    voices.find(v => v.name.includes("Alice")) ||
                    voices.find(v => v.lang === "it-IT");
}

function announceNumber(number, reparto) {
    const mode = localStorage.getItem("audioMode") || "synth";
    if (mode==="synth" && 'speechSynthesis' in window) {
        const msg = new SpeechSynthesisUtterance(reparto + " " + number);
        msg.voice = selectedVoice;
        msg.rate = 0.7;
        msg.pitch = 1.0;
        window.speechSynthesis.speak(msg);
    } else audio.play().catch(console.log);
}

function highlightNumber(el) {
    el.classList.add("highlight");
    setTimeout(() => el.classList.remove("highlight"),5000);
}

// Aggiorna tickets e cronologia
socket.on("update_tickets", numeri => {
    for (const reparto in numeri) {
        const el = document.getElementById("ticket-" + reparto);
        if (!el) continue;
        const oldNumber = el.innerText;
        el.innerText = numeri[reparto];
        if(oldNumber != numeri[reparto]) {
            highlightNumber(el);
            announceNumber(numeri[reparto], el.dataset.reparto);
        }
    }
    loadHistory();
});

// --- CRONOLOGIA ---
async function loadHistory(limit=10){
    try{
        const res = await fetch(`/api/cronologia_utente?limit=${limit}&_=${Date.now()}`);
        const data = await res.json();
        const ul = document.getElementById("historyList");
        ul.innerHTML="";
        data.slice(0,limit).forEach(item=>{
            let displayTime="";
            if(item.created_at){
                const d=new Date(item.created_at);
                if(!isNaN(d)){ d.setHours(d.getHours()+1); displayTime = d.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}); }
            }
            const li = document.createElement("li");
            li.className="history-item";
            li.innerHTML=`<span class="history-number">${item.numero}</span>
                          <span class="history-text">${item.reparto}</span>
                          <span class="history-time">${displayTime}</span>`;
            ul.appendChild(li);
        });
    } catch(e){ console.error("Errore fetch cronologia:", e); }
}

// --- QR CODE ---
function generateQRCode(){
    const qrContainer = document.getElementById("qrcode");
    qrContainer.innerHTML="";
    const size = qrContainer.offsetWidth;
    const userId = "{{ user_id }}";
    if(!userId) return console.error("user_id non definito");
    new QRCode(qrContainer, {text:window.location.origin+"/ritira_ticket_qr?user="+userId,width:size,height:size});
}

// --- CAROUSEL ---
let currentIndex=0;
const carousel = document.querySelector(".carousel-images");
if(carousel) setInterval(()=>{ currentIndex=(currentIndex+1)%carousel.children.length; carousel.style.transform=`translateX(-${currentIndex*100}%)`; },3000);

// --- INIT ---
document.addEventListener("DOMContentLoaded", ()=>{
    generateQRCode();
    loadVoices();
    loadHistory(50);
    setInterval(()=>loadHistory(50),15000);
    window.speechSynthesis.onvoiceschanged = loadVoices;
});
</script>
</body>
</html>
